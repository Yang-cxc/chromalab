<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Email</title>

<style type="text/css">
body {
	margin: 0;
	padding: 0;
	font-family: "Microsoft YaHei", SimSun, Arial, sans-serif;
	background: linear-gradient(135deg, #DCEAF7 0%, #D8D3F0 45%, #EFE7F8 100%);
	color: #222;
}

/* 整体容器 */
.container {
	width: 900px;
	margin: 120px auto 0 auto;
}

/* 页面大标题 */
.page-title {
	text-align: center;
	font-size: 46px;
	font-weight: bold;
	color: #2F3A68;
	margin-bottom: 40px;
	letter-spacing: 2px;
}

/* 联系信息卡片 */
.contact-card {
	background: rgba(255, 255, 255, 0.86);
	border: 1px solid rgba(255, 255, 255, 0.8);
	border-radius: 20px;
	box-shadow: 0 8px 28px rgba(50, 60, 100, 0.22);
	padding: 45px 60px;
}

/* 每一块信息 */
.info-block {
	margin-bottom: 38px;
	padding-bottom: 28px;
	border-bottom: 1px solid #c8c8d8;
}

.info-block-last {
	margin-bottom: 0;
	padding-bottom: 0;
	border-bottom: none;
}

/* 小标题 */
.info-title {
	font-size: 36px;
	font-weight: bold;
	color: #2F3A68;
	margin: 0 0 20px 0;
}

/* 内容文字 */
.info-text {
	font-size: 28px;
	line-height: 1.8;
	color: #222;
	margin: 0;
}

/* 邮箱链接 */
.info-text a {
	color: #1F4E79;
	text-decoration: none;
}

.info-text a:hover {
	text-decoration: underline;
}

/* 返回首页 */
.back-home {
	text-align: center;
	margin-top: 35px;
}

.back-home a {
	font-size: 22px;
	color: #2F3A68;
	font-weight: bold;
	text-decoration: none;
}

.back-home a:hover {
	text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

	<div class="page-title">联系我们</div>

	<div class="contact-card">

		<div class="info-block">
			<h1 class="info-title">E-mail</h1>
			<p class="info-text">
				高程老师：
				<a href="mailto:794962485@qq.com">794962485@qq.com</a>
			</p>
		</div>

		<div class="info-block info-block-last">
			<h1 class="info-title">实验室地址</h1>
			<p class="info-text">
				辽宁科技大学博识楼 B125
			</p>
		</div>

	</div>

	<div class="back-home">
		<a href="./index.html">返回首页</a>
	</div>

</div>

</body>
</html>
